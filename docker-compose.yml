services:
  roach-single:
    image: cockroachdb/cockroach:v26.1.3
    container_name: roach-single
#    ports:
#      - "26257:26257" # SQL
#      - "8080:8080"   # DB Console (UI)
    command: start-single-node --insecure
#    volumes:
#      - ./roach-data:/cockroach/cockroach-data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health?ready=1" ]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      roach-single:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://roach-single:26257/defaultdb?sslmode=disable
      SPRING_DATASOURCE_USERNAME: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081