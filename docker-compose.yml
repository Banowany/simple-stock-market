services:
  db1:
    image: cockroachdb/cockroach:v26.1.3
    hostname: db1
    command: start --insecure --join=db1,db2,db3
#    volumes:
#      - db1-data:/cockroach/cockroach-data
#    ports:
#      - "26257:26257"
#      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 3s
      retries: 10

  db2:
    image: cockroachdb/cockroach:v26.1.3
    hostname: db2
    command: start --insecure --join=db1,db2,db3
#    volumes:
#      - db2-data:/cockroach/cockroach-data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 3s
      retries: 10

  db3:
    image: cockroachdb/cockroach:v26.1.3
    hostname: db3
    command: start --insecure --join=db1,db2,db3
#    volumes:
#      - db3-data:/cockroach/cockroach-data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 3s
      retries: 10

  db-init:
    image: cockroachdb/cockroach:v26.1.3
    depends_on:
      db1:
        condition: service_healthy
      db2:
        condition: service_healthy
      db3:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
      echo 'Checking if cluster is initialized...';
      cockroach node status --insecure --host=db1 > /dev/null 2>&1;

      if [ $? -ne 0 ]; then
        echo 'Cluster not initialized. Running init...';
        cockroach init --insecure --host=db1;
      else
        echo 'Cluster already initialized. Skipping init.';
      fi
      "

  app:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db1:26257,db2:26257,db3:26257/defaultdb?sslmode=disable
      SPRING_DATASOURCE_USERNAME: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081